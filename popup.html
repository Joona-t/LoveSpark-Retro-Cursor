<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoveSpark Retro Cursor Pack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="lib/lovespark-footer.css">
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;position:relative">
          <h1>LoveSpark Retro Cursor Pack</h1>
          <div class="theme-dropdown" id="themeDropdown">
      <button class="theme-dropdown-trigger" id="themeToggle">
        <span id="themeLabel">Retro Pink</span> ▾
      </button>
      <div class="theme-dropdown-menu" id="themeMenu">
        <div class="theme-dropdown-header">Change Theme</div>
        <button class="theme-option" data-theme="retro">Retro Pink</button>
        <button class="theme-option" data-theme="dark">Dark</button>
        <button class="theme-option" data-theme="beige">Beige</button>
        <button class="theme-option" data-theme="slate">Slate</button>
      </div>
    </div>
        </div>
        <p class="subtitle">Cute cursors with soft glow and sparkle vibes ✨</p>

        <label class="toggle-row" for="cursorToggle">
          <span id="statusText">Cursors: ON</span>
          <span class="toggle-wrap">
            <input id="cursorToggle" type="checkbox" checked />
            <span class="slider"></span>
          </span>
        </label>

        <div class="theme-section">
          <p class="theme-group-label">Originals</p>
          <div class="theme-list" id="themeList">
            <button class="theme-item" data-pack="retro-pink" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#ffb6c1,#ff69b4)"></span>
              <span class="theme-name">🌸 Retro Pink</span>
            </button>
            <button class="theme-item" data-pack="sakura-peach" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#ffd7b0,#ffb6c1)"></span>
              <span class="theme-name">🌺 Sakura Peach</span>
            </button>
            <button class="theme-item" data-pack="starlight-purple" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#c39bd3,#9b59b6)"></span>
              <span class="theme-name">⭐ Starlight Purple</span>
            </button>
          </div>

          <p class="theme-group-label">New Collection</p>
          <div class="theme-list">
            <button class="theme-item" data-pack="moonlight-rose" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#c2185b,#f48fb1)"></span>
              <span class="theme-name">🌙 Moonlight Rose</span>
            </button>
            <button class="theme-item" data-pack="candy-floss" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#ffb6c1,#e1bee7,#bbdefb,#c8e6c9)"></span>
              <span class="theme-name">🍬 Candy Floss</span>
            </button>
            <button class="theme-item" data-pack="cyber-cherry" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#d50000,#ff69b4)"></span>
              <span class="theme-name">🍒 Cyber Cherry</span>
            </button>
            <button class="theme-item" data-pack="mint-blossom" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#a5d6a7,#80cbc4)"></span>
              <span class="theme-name">🌿 Mint Blossom</span>
            </button>
            <button class="theme-item" data-pack="golden-hour" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#ffab91,#ffd54f)"></span>
              <span class="theme-name">🌅 Golden Hour</span>
            </button>
            <button class="theme-item" data-pack="holographic" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#ff6eb4,#c084fc,#818cf8,#5eead4)"></span>
              <span class="theme-name">🌈 Holographic</span>
            </button>
            <button class="theme-item" data-pack="obsidian-heart" type="button">
              <span class="swatch" style="background:linear-gradient(135deg,#1a1a1a,#c2185b)"></span>
              <span class="theme-name">🖤 Obsidian Heart</span>
            </button>
          </div>
        </div>
      </section>
    </main>
    <script src="lib/lovespark-footer.js"></script>
<script src="popup.js"></script>
  </body>
</html>
